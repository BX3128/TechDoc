<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">
    <title>Deep Learning & Python 期中模擬考試 V5 (Powered by AI)</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <style>
        /* ==========================================
           1. 佈景主題變數定義 (Theme Variables)
           ========================================== */
        :root {
            --primary-color: #1e40af; --bg-color: #f1f5f9; --container-bg: #ffffff;
            --row-bg: #ffffff; --summary-bg: #f8fafc; --border: #cbd5e1;
            --text-main: #0f172a; --text-sub: #64748b; --text-label: #0369a1;
            --label-bg: #e0f2fe; --th-bg: #334155; --th-text: #ffffff;
            --box-shadow: 0 4px 10px -2px rgba(0, 0, 0, 0.1);
            --correct-bg: #dcfce7; --correct-text: #166534;
            --incorrect-bg: #fee2e2; --incorrect-text: #991b1b;
        }

        [data-theme="dark"] { --primary-color: #38bdf8; --bg-color: #0f172a; --container-bg: #1e293b; --row-bg: #1e293b; --summary-bg: #0f172a; --border: #334155; --text-main: #f8fafc; --text-sub: #94a3b8; --text-label: #bae6fd; --label-bg: #0369a1; --th-bg: #020617; --th-text: #e2e8f0; --box-shadow: 0 4px 10px -2px rgba(0, 0, 0, 0.5); --correct-bg: #064e3b; --correct-text: #a7f3d0; --incorrect-bg: #7f1d1d; --incorrect-text: #fecaca; }
        [data-theme="sepia"] { --primary-color: #8b5a2b; --bg-color: #f4ecd8; --container-bg: #fdf6e3; --row-bg: #fdf6e3; --summary-bg: #eee8d5; --border: #d0c5b4; --text-main: #4c3b2b; --text-sub: #7a6a58; --text-label: #a0522d; --label-bg: #eaddc5; --th-bg: #5c4b3a; --th-text: #fdf6e3; --correct-bg: #dbe4c6; --correct-text: #3f4d23; --incorrect-bg: #f4d0cb; --incorrect-text: #662218;}
        [data-theme="nord"] { --primary-color: #88c0d0; --bg-color: #2e3440; --container-bg: #3b4252; --row-bg: #3b4252; --summary-bg: #2e3440; --border: #4c566a; --text-main: #d8dee9; --text-sub: #94a3b8; --text-label: #88c0d0; --label-bg: #434c5e; --th-bg: #242933; --th-text: #eceff4; --correct-bg: #3b4252; --correct-text: #a3be8c; --incorrect-bg: #3b4252; --incorrect-text: #bf616a;}
        [data-theme="dracula"] { --primary-color: #bd93f9; --bg-color: #282a36; --container-bg: #44475a; --row-bg: #44475a; --summary-bg: #282a36; --border: #6272a4; --text-main: #f8f8f2; --text-sub: #bd93f9; --text-label: #ff79c6; --label-bg: #282a36; --th-bg: #21222c; --th-text: #f8f8f2; --correct-bg: #44475a; --correct-text: #50fa7b; --incorrect-bg: #44475a; --incorrect-text: #ff5555;}
        [data-theme="forest"] { --primary-color: #a7c080; --bg-color: #2d353b; --container-bg: #343f44; --row-bg: #343f44; --summary-bg: #2d353b; --border: #475258; --text-main: #d3c6aa; --text-sub: #859289; --text-label: #dbbc7f; --label-bg: #3d484d; --th-bg: #232a2e; --th-text: #d3c6aa; --correct-bg: #343f44; --correct-text: #a7c080; --incorrect-bg: #343f44; --incorrect-text: #e67e80;}
        [data-theme="midnight"] { --primary-color: #6366f1; --bg-color: #000000; --container-bg: #0a0a0a; --row-bg: #0a0a0a; --summary-bg: #000000; --border: #1f1f1f; --text-main: #ffffff; --text-sub: #a1a1aa; --text-label: #818cf8; --label-bg: #111827; --th-bg: #000000; --th-text: #ffffff; --correct-bg: #022c22; --correct-text: #34d399; --incorrect-bg: #450a0a; --incorrect-text: #f87171;}
        [data-theme="solarized-light"] { --primary-color: #268bd2; --bg-color: #fdf6e3; --container-bg: #eee8d5; --row-bg: #fdf6e3; --summary-bg: #eee8d5; --border: #d33682; --text-main: #657b83; --text-sub: #93a1a1; --text-label: #cb4b16; --label-bg: #eee8d5; --th-bg: #073642; --th-text: #fdf6e3; --correct-bg: #e6edd1; --correct-text: #859900; --incorrect-bg: #f8e1df; --incorrect-text: #dc322f;}
        [data-theme="synthwave"] { --primary-color: #ff7edb; --bg-color: #241b2f; --container-bg: #2d233f; --row-bg: #2d233f; --summary-bg: #241b2f; --border: #72f1b8; --text-main: #ffffff; --text-sub: #fe4450; --text-label: #36f9f6; --label-bg: #241b2f; --th-bg: #1a1423; --th-text: #ffffff; --correct-bg: #2d233f; --correct-text: #72f1b8; --incorrect-bg: #2d233f; --incorrect-text: #fe4450;}
        [data-theme="gruvbox"] { --primary-color: #fe8019; --bg-color: #282828; --container-bg: #3c3836; --row-bg: #3c3836; --summary-bg: #282828; --border: #ebdbb2; --text-main: #ebdbb2; --text-sub: #a89984; --text-label: #b8bb26; --label-bg: #282828; --th-bg: #1d2021; --th-text: #ebdbb2; --correct-bg: #3c3836; --correct-text: #b8bb26; --incorrect-bg: #3c3836; --incorrect-text: #fb4934;}

        /* ==========================================
           2. 核心排版與自訂樣式 (Markdown Code)
           ========================================== */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif; background-color: var(--bg-color); color: var(--text-main); padding: 30px; margin: 0; line-height: 1.6; transition: background-color 0.3s, color 0.3s; }
        * { font-style: normal !important; box-sizing: border-box; }
        .container { max-width: 1200px; margin: 0 auto; }

        header { background: var(--container-bg); padding: 20px 30px; border-radius: 12px; border-bottom: 4px solid var(--primary-color); box-shadow: var(--box-shadow); margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        
        .inline-code { font-family: 'Consolas', 'Monaco', 'Courier New', monospace; background-color: var(--label-bg); color: var(--text-label); padding: 0.15em 0.4em; border-radius: 4px; font-size: 0.9em; border: 1px solid var(--border); }

        .control-panel { background: var(--container-bg); padding: 20px 30px; border-radius: 10px; margin-bottom: 30px; border: 1px solid var(--border); display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }
        .controls-group { display: flex; align-items: center; gap: 8px; }
        .controls-group.full-width { grid-column: 1 / -1; justify-content: flex-start; flex-wrap: wrap; border-top: 1px dashed var(--border); padding-top: 15px;}

        input[type="number"] { width: 60px; padding: 6px 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-color); color: var(--text-main); font-weight: bold; }
        input[type="number"]:disabled { opacity: 0.6; cursor: not-allowed; }
        select, input[type="checkbox"] { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-color); color: var(--text-main); font-weight: bold; cursor: pointer; }

        button { padding: 8px 16px; border-radius: 6px; border: 1px solid var(--primary-color); background: var(--primary-color); color: #fff; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button.danger { background: transparent; color: #ef4444; border-color: #ef4444; }
        button.danger:hover { background: #ef4444; color: #fff; }
        button.large-submit { width: 100%; font-size: 1.3em; padding: 15px; margin-top: 30px; background: var(--primary-color); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        .eval-btn { background: transparent; border: 2px solid var(--border); color: var(--text-sub); }
        .eval-btn:hover { background: var(--label-bg); }
        .eval-btn.eval-c.active { background: var(--correct-bg); border-color: var(--correct-text); color: var(--correct-text); }
        .eval-btn.eval-i.active { background: var(--incorrect-bg); border-color: var(--incorrect-text); color: var(--incorrect-text); }

        /* ==========================================
           3. 考卷渲染區塊樣式
           ========================================== */
        .theme-section { background: transparent; margin-bottom: 50px; }
        .theme-header { color: var(--primary-color); font-size: 1.6em; margin: 0 0 20px 0; padding-bottom: 10px; border-bottom: 2px solid var(--primary-color); display: flex; justify-content: space-between;}
        .section-score { font-size: 0.6em; background: var(--label-bg); color: var(--text-label); padding: 4px 12px; border-radius: 20px; vertical-align: middle;}

        .question-card { background: var(--row-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: var(--box-shadow); transition: all 0.3s ease; }
        
        .q-header { display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center; }
        .q-meta { display: flex; gap: 10px; align-items: center; }
        .q-sn { font-family: monospace; font-size: 1.2em; font-weight: bold; color: var(--text-label); background: var(--label-bg); padding: 4px 10px; border-radius: 6px; }
        .q-pts { font-size: 0.9em; font-weight: bold; color: var(--primary-color); }
        .q-rate { font-size: 0.85em; color: var(--text-sub); }
        .q-text { font-size: 1.1em; font-weight: 600; line-height: 1.5; margin-bottom: 20px; }

        .options-list { display: flex; flex-direction: column; gap: 10px; }
        .option-label { display: flex; align-items: center; padding: 12px 15px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; background: var(--bg-color); transition: background 0.2s, border-color 0.2s; }
        .option-label:hover { border-color: var(--primary-color); }
        .option-label input[type="radio"] { margin-right: 15px; transform: scale(1.2); }
        
        .question-card.answered-correct { border-color: var(--correct-text); }
        .question-card.answered-incorrect { border-color: var(--incorrect-text); }
        .option-label.is-correct { background: var(--correct-bg); border-color: var(--correct-text); color: var(--correct-text); font-weight: bold; }
        .option-label.is-incorrect { background: var(--incorrect-bg); border-color: var(--incorrect-text); color: var(--incorrect-text); }
        .option-label.disabled { pointer-events: none; opacity: 0.8; }

        .sa-textarea { width: 100%; min-height: 100px; padding: 15px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-color); color: var(--text-main); font-family: inherit; resize: vertical; margin-bottom: 15px; }

        .explanation-box { margin-top: 20px; padding: 15px; background: var(--summary-bg); border-left: 4px solid var(--primary-color); border-radius: 0 8px 8px 0; font-size: 0.95em; display: none; }
        .explanation-box.show { display: block; animation: fadeIn 0.3s ease; }
        .exp-title { font-weight: bold; margin-bottom: 8px; color: var(--primary-color); }
        .exp-key { display: inline-block; background: var(--label-bg); color: var(--text-label); padding: 2px 8px; border-radius: 4px; font-size: 0.85em; margin-bottom: 10px; }
        
        .action-row { margin-top: 15px; display: flex; justify-content: flex-end; }
        .toggle-exp-btn { background: transparent; color: var(--text-main); border: 1px solid var(--border); }
        .toggle-exp-btn:hover { background: var(--border); }

        .score-board { text-align: center; font-size: 2em; padding: 20px; background: var(--label-bg); color: var(--text-label); border-radius: 10px; margin-bottom: 30px; border: 2px solid var(--primary-color); display: none;}

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .control-panel { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 style="margin: 0; font-size: 24px;">Deep Learning & Python 期中模擬考試 V5 (Powered by AI)</h1>
    </header>
    
    <div class="control-panel">
        <div class="controls-group">
            <label>選擇題數：</label><input type="number" id="cfg_t1" min="0"> 
            <label>總分:</label><input type="number" id="pts_t1" min="0">
        </div>
        <div class="controls-group">
            <label>是非題數：</label><input type="number" id="cfg_t2" min="0">
            <label>總分:</label><input type="number" id="pts_t2" min="0">
        </div>
        <div class="controls-group">
            <label>簡答題數：</label><input type="number" id="cfg_t3" min="0">
            <label>總分:</label><input type="number" id="pts_t3" min="0">
        </div>
        
        <div class="controls-group">
            <label>出題模式：</label>
            <select id="cfg_mode">
                <option value="random">🎲 隨機抽題</option>
                <option value="review">🔥 複習 (錯題優先)</option>
                <option value="scan">🚀 掃題 (未做過優先)</option>
                <option value="all">📚 全部 (顯示所有題庫)</option>
            </select>
        </div>
        <div class="controls-group">
            <label>佈景主題：</label>
            <select id="themeSelect">
                <option value="auto">依系統設置</option>
                <option value="light">淺色 (Light)</option>
                <option value="dark">深色 (Dark)</option>
                <option value="sepia">護眼 (Sepia)</option>
                <option value="nord">北歐冰霜 (Nord)</option>
                <option value="dracula">極客深紫 (Dracula)</option>
            </select>
        </div>
        <div class="controls-group" style="grid-column: 1 / -1;">
            <input type="checkbox" id="cfg_shuffle">
            <label for="cfg_shuffle" style="margin-right: 20px;">選項亂序</label>
            <input type="checkbox" id="cfg_delayed" checked>
            <label for="cfg_delayed" style="color: var(--primary-color);">集中交卷 (不要立刻對答案)</label>
        </div>

        <div class="controls-group full-width">
            <button id="btnGenerate" style="font-size: 1.1em; padding: 10px 24px;">📝 生成考卷</button>
            <div style="width: 2px; height: 30px; background: var(--border); margin: 0 10px;"></div>
            <label style="font-weight: bold; margin-right: 5px;">預設展開詳解：</label>
            <input type="checkbox" id="exp_t1" class="exp-toggle" data-type="1"><label for="exp_t1">選擇</label>
            <input type="checkbox" id="exp_t2" class="exp-toggle" data-type="2"><label for="exp_t2">是非</label>
            <input type="checkbox" id="exp_t3" class="exp-toggle" data-type="3"><label for="exp_t3">簡答</label>
            <div style="flex-grow: 1;"></div>
            <button id="btnClearSettings" class="danger">清除設定</button>
            <button id="btnClearHistory" class="danger">清除記錄</button>
        </div>
    </div>

    <div id="scoreBoard" class="score-board"></div>

    <div id="examContent">
        <div style="text-align: center; color: var(--text-sub); padding: 50px;">
            請設定題數後，點擊「生成考卷」開始測驗。
        </div>
    </div>
</div>

<script>
// ==========================================
// 1. 系統常數與題庫資料
// ==========================================
const KEY_SETTINGS = 'nsm_exam_settings_v5';
const KEY_HISTORY = 'nsm_exam_history_v5';

const TYPE_MAP = {
    1: { id: 1, name: "選擇題", defaultCount: 20, defaultPts: 40 },
    2: { id: 2, name: "是非題", defaultCount: 20, defaultPts: 40 },
    3: { id: 3, name: "簡答題", defaultCount: 10, defaultPts: 20 }
};

// 請於此處手動內嵌題庫陣列 (維持空白供填入)
const QUESTION_BANK = [
    {
        "n": 1,
        "t": 1,
        "q": "在深度學習與 PyTorch 中，單一數字（Single number）被稱為什麼級別的張量？\nIn PyTorch, what is a single number called in terms of tensors?",
        "o": {
            "o1": "1D 張量（1D Tensor） / Vector",
            "o2": "2D 張量（2D Tensor） / Matrix",
            "o3": "0D 張量（0D Tensor） / Scalar",
            "o4": "3D 張量（3D Tensor） / Cube"
        },
        "a": 3,
        "e": "{o3} 是正確的，0D 張量代表不具備陣列結構的單一數值（純量）。{o1} 錯誤，1D 張量是向量（一維陣列）。{o2} 錯誤，2D 張量是矩陣（二維陣列）。{o4} 錯誤，3D 張量通常表示為立方體（三維陣列）。",
        "k": "張量的基本維度定義與術語（Scalar, Vector, Matrix, Tensor）。",
        "g": 1
    },
    {
        "n": 2,
        "t": 1,
        "q": "若要在 PyTorch 中取得張量 `x` 的維度數量（例如它是 1D 還是 2D），應使用下列哪個方法或屬性？\nWhich method or attribute is used to get the number of dimensions of a tensor `x` in PyTorch?",
        "o": {
            "o1": "x.shape",
            "o2": "x.dim()",
            "o3": "x.size()",
            "o4": "x.view()"
        },
        "a": 2,
        "e": "{o2} 是正確的，`x.dim()` 會回傳張量的維度數（等同於 NumPy 的 `ndim`）。{o1} 錯誤，`x.shape` 回傳的是各維度的大小（例如 $3 \\times 3$），而非單純的維度數量。{o3} 錯誤，`x.size()` 的功能與 `x.shape` 相同。{o4} 錯誤，`x.view()` 用於重塑張量形狀。",
        "k": "張量屬性操作與維度查詢（ndim/dim）。",
        "g": 1
    },
    {
        "n": 3,
        "t": 1,
        "q": "相比於 NumPy，PyTorch 張量（Tensor）在深度學習中最關鍵的兩大優勢為何？\nWhat are the two most critical advantages of PyTorch Tensors over NumPy arrays in deep learning?",
        "o": {
            "o1": "支援更多統計函式與字串處理 / Supports more statistical functions and string parsing",
            "o2": "支援自動微分（Automatic Differentiation）與 GPU 加速計算 / Supports automatic differentiation and GPU acceleration",
            "o3": "檔案體積更小且無需安裝外部套件 / Smaller file size and requires no external packages",
            "o4": "內建網頁視覺化工具與資料庫連線 / Built-in web visualization tools and database connections"
        },
        "a": 2,
        "e": "{o2} 是正確的，PyTorch 的核心優勢在於 Autograd 機制以及能夠將資料送入 GPU 進行平行加速。{o1}、{o3}、{o4} 錯誤，這些都不是 PyTorch 取代 NumPy 進行模型訓練的主要原因，且 PyTorch 同樣需要安裝套件。",
        "k": "PyTorch 與 NumPy 的核心差異與應用場景。",
        "g": 2
    },
    {
        "n": 4,
        "t": 1,
        "q": "如何在 Google Colab 或本地環境中，將 CPU 上的張量 `tensor_cpu` 轉移到 GPU 上？\nHow do you transfer a tensor `tensor_cpu` from CPU to GPU?",
        "o": {
            "o1": "tensor_gpu = tensor_cpu.gpu()",
            "o2": "tensor_gpu = torch.cuda(tensor_cpu)",
            "o3": "tensor_gpu = tensor_cpu.to('cuda')",
            "o4": "tensor_gpu = tensor_cpu.move('GPU')"
        },
        "a": 3,
        "e": "{o3} 是正確的，使用 `.to('cuda')` 方法可以將張量轉移至 GPU。{o1}、{o2}、{o4} 錯誤，這些都不是 PyTorch 標準的硬體轉移 API。",
        "k": "張量的設備轉移（Device Transfer）。",
        "g": 2
    },
    {
        "n": 5,
        "t": 1,
        "q": "欲建立一個形狀為 $2 \\times 3$ 且數值全為 0 的張量，應使用哪一行程式碼？\nWhich code snippet creates a $2 \\times 3$ tensor filled with zeros?",
        "o": {
            "o1": "torch.zeros(2, 3)",
            "o2": "torch.empty(2, 3)",
            "o3": "torch.tensor([0, 0, 0], [0, 0, 0])",
            "o4": "torch.null(2, 3)"
        },
        "a": 1,
        "e": "{o1} 是正確的，`torch.zeros(2, 3)` 會生成指定形狀的全零張量。{o2} 錯誤，`torch.empty()` 會配置記憶體但不會初始化數值（內容為隨機垃圾值）。{o3} 錯誤，語法不合規，少了一層中括號 `[]`。{o4} 錯誤，PyTorch 沒有 `torch.null()` 函式。",
        "k": "張量的初始化與建立函式（Creation Ops）。",
        "g": 3
    },
    {
        "n": 6,
        "t": 1,
        "q": "關於 PyTorch 的矩陣乘法，下列哪一個函式可用於計算兩個 2D 張量的矩陣乘積（Matrix Multiplication）？\nWhich function is used to perform matrix multiplication of two 2D tensors?",
        "o": {
            "o1": "torch.mul()",
            "o2": "torch.matmul()",
            "o3": "torch.add()",
            "o4": "torch.cross()"

let sysSettings = {};
let userHistory = {}; 
let currentExamData = []; 
let currentAnswers = {}; 
let currentSAStatus = {}; 
let isGraded = false;

function initStorage() {
    const defaultSettings = { 
        counts: { 1: TYPE_MAP[1].defaultCount, 2: TYPE_MAP[2].defaultCount, 3: TYPE_MAP[3].defaultCount },
        pts: { 1: TYPE_MAP[1].defaultPts, 2: TYPE_MAP[2].defaultPts, 3: TYPE_MAP[3].defaultPts },
        mode: 'random', shuffle: true, delayed: true, theme: 'auto',
        expStates: { 1: false, 2: false, 3: false }
    };
    sysSettings = JSON.parse(localStorage.getItem(KEY_SETTINGS)) || defaultSettings;
    userHistory = JSON.parse(localStorage.getItem(KEY_HISTORY)) || {};

    document.getElementById('pts_t1').value = sysSettings.pts[1];
    document.getElementById('pts_t2').value = sysSettings.pts[2];
    document.getElementById('pts_t3').value = sysSettings.pts[3];
    document.getElementById('cfg_mode').value = sysSettings.mode || 'random';
    document.getElementById('cfg_shuffle').checked = sysSettings.shuffle;
    document.getElementById('cfg_delayed').checked = sysSettings.delayed;
    document.getElementById('themeSelect').value = sysSettings.theme;
    document.getElementById('exp_t1').checked = sysSettings.expStates[1];
    document.getElementById('exp_t2').checked = sysSettings.expStates[2];
    document.getElementById('exp_t3').checked = sysSettings.expStates[3];

    updateCountUI(); 
    applyTheme(sysSettings.theme);
}

function updateCountUI() {
    const mode = document.getElementById('cfg_mode').value;
    const t1 = document.getElementById('cfg_t1');
    const t2 = document.getElementById('cfg_t2');
    const t3 = document.getElementById('cfg_t3');

    if (mode === 'all') {
        t1.value = QUESTION_BANK.filter(q => q.t === 1).length;
        t2.value = QUESTION_BANK.filter(q => q.t === 2).length;
        t3.value = QUESTION_BANK.filter(q => q.t === 3).length;
        t1.disabled = true; t2.disabled = true; t3.disabled = true;
    } else {
        t1.disabled = false; t2.disabled = false; t3.disabled = false;
        t1.value = sysSettings.counts[1] || TYPE_MAP[1].defaultCount;
        t2.value = sysSettings.counts[2] || TYPE_MAP[2].defaultCount;
        t3.value = sysSettings.counts[3] || TYPE_MAP[3].defaultCount;
    }
}

function saveSettings() {
    const mode = document.getElementById('cfg_mode').value;
    
    if (mode !== 'all') {
        sysSettings.counts = { 
            1: parseInt(document.getElementById('cfg_t1').value)||0, 
            2: parseInt(document.getElementById('cfg_t2').value)||0, 
            3: parseInt(document.getElementById('cfg_t3').value)||0 
        };
    }
    
    sysSettings.pts = { 
        1: parseInt(document.getElementById('pts_t1').value)||0, 
        2: parseInt(document.getElementById('pts_t2').value)||0, 
        3: parseInt(document.getElementById('pts_t3').value)||0 
    };
    sysSettings.mode = mode;
    sysSettings.shuffle = document.getElementById('cfg_shuffle').checked;
    sysSettings.delayed = document.getElementById('cfg_delayed').checked;
    sysSettings.theme = document.getElementById('themeSelect').value;
    sysSettings.expStates = { 1: document.getElementById('exp_t1').checked, 2: document.getElementById('exp_t2').checked, 3: document.getElementById('exp_t3').checked };
    
    localStorage.setItem(KEY_SETTINGS, JSON.stringify(sysSettings));
}

function updateHistory(n, isCorrect) {
    if (!userHistory[n]) userHistory[n] = { attempts: 0, correct: 0 };
    userHistory[n].attempts += 1;
    if (isCorrect) userHistory[n].correct += 1;
    localStorage.setItem(KEY_HISTORY, JSON.stringify(userHistory));
}

function getCorrectRateText(n) {
    const h = userHistory[n];
    if (!h || h.attempts === 0) return "未作答過";
    const rate = Math.round((h.correct / h.attempts) * 100);
    return `歷史正確率: ${rate}% (${h.correct}/${h.attempts})`;
}

function parseMarkdownCode(text) {
    if (!text) return text;
    return text.replace(/`([^`]+)`/g, '<code class="inline-code">$1</code>');
}

function triggerKaTeX() {
    if (typeof renderMathInElement === "function") {
        renderMathInElement(document.body, {
            delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}],
            throwOnError: false
        });
    }
}

function applyTheme(themeValue) {
    let activeTheme = themeValue === 'auto' ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') : themeValue;
    document.documentElement.setAttribute('data-theme', activeTheme);
}

// ==========================================
// 4. 排序策略引擎
// ==========================================
function shuffleArray(array) {
    const arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function sortQuestionPool(pool, mode) {
    if (mode === 'all') {
        return [...pool].sort((a, b) => a.n - b.n); 
    }
    
    let arr = shuffleArray(pool); 
    if (mode === 'scan') {
        arr.sort((a, b) => ((userHistory[a.n] || {}).attempts || 0) - ((userHistory[b.n] || {}).attempts || 0));
    } else if (mode === 'review') {
        const getErrRate = (n) => {
            const h = userHistory[n];
            if (!h || h.attempts === 0) return 0.5; 
            return 1 - (h.correct / h.attempts);
        };
        arr.sort((a, b) => getErrRate(b.n) - getErrRate(a.n));
    }
    return arr;
}

function generateExam() {
    saveSettings();
    document.getElementById("scoreBoard").style.display = 'none';
    const container = document.getElementById("examContent");
    container.innerHTML = "";
    currentExamData = [];
    currentAnswers = {};
    currentSAStatus = {}; 
    isGraded = false;

    Object.keys(TYPE_MAP).forEach(typeId => {
        const typeNum = parseInt(typeId);
        let pool = QUESTION_BANK.filter(q => q.t === typeNum);
        
        const reqCount = sysSettings.mode === 'all' ? pool.length : sysSettings.counts[typeNum];
        const totalPts = sysSettings.pts[typeNum];
        
        if (reqCount <= 0 || pool.length === 0) return;

        let selectedQs = sortQuestionPool(pool, sysSettings.mode).slice(0, reqCount);
        
        // 僅計算用作 UI 顯示的大約配分
        const ptsPerQ = Math.round((totalPts / selectedQs.length) * 100) / 100;
        
        const section = document.createElement("div");
        section.className = "theme-section";
        section.innerHTML = `<h2 class="theme-header">
            <span>📜 ${TYPE_MAP[typeNum].name} (${selectedQs.length} 題)</span>
            <span class="section-score">總分: ${totalPts} | 每題: ${ptsPerQ} 分</span>
        </h2>`;
        
        selectedQs.forEach((q, index) => {
            const renderData = processQuestionData(q, ptsPerQ);
            currentExamData.push(renderData);
            section.appendChild(buildQuestionDOM(renderData, index + 1));
        });

        container.appendChild(section);
    });

    if (currentExamData.length === 0) {
        container.innerHTML = `<div style="text-align: center; color: var(--text-sub); padding: 50px;">題庫中沒有符合條件的題目，或未設定題數。</div>`;
    } else if (sysSettings.delayed) {
        const btn = document.createElement("button");
        btn.className = "large-submit";
        btn.innerHTML = "📝 繳交試卷並計算成績";
        btn.onclick = gradeAllExam;
        container.appendChild(btn);
    }

    triggerKaTeX(); 
}

function processQuestionData(q, ptsPerQ) {
    let data = { ...q, displayPts: ptsPerQ, mapKeyToLabel: {}, mapLabelToKey: {} };
    data.parsedQ = parseMarkdownCode(q.q);
    data.parsedExp = parseMarkdownCode(q.e);
    
    if (q.t === 3) data.parsedA = parseMarkdownCode(String(q.a || ''));
    
    if (q.t === 1 && q.o) {
        data.parsedOpts = {};
        const labels = ['A', 'B', 'C', 'D', 'E', 'F'];
        const keys = Object.keys(q.o);
        const displayKeys = sysSettings.shuffle ? shuffleArray(keys) : keys;
        
        displayKeys.forEach((k, idx) => {
            data.mapKeyToLabel[k] = labels[idx];
            data.mapLabelToKey[labels[idx]] = k;
            data.parsedOpts[k] = parseMarkdownCode(q.o[k]);
        });
        data.parsedExp = data.parsedExp.replace(/{o(\d+)}/g, (m, p1) => data.mapKeyToLabel['o' + p1] ? `(${data.mapKeyToLabel['o' + p1]})` : m);
    }
    return data;
}

function buildQuestionDOM(qData, displayIdx) {
    const card = document.createElement("div");
    card.className = "question-card";
    card.id = `qcard_${qData.n}`;
    const isAutoExpand = sysSettings.expStates[qData.t];

    const answerBlock = qData.t === 3 
        ? `<div class="exp-title">🔑 參考解答：</div><div style="margin-bottom:15px;">${qData.parsedA}</div><hr style="border:0; border-top:1px dashed var(--border); margin:15px 0;">` 
        : '';

    let html = `
        <div class="q-header">
            <div class="q-meta">
                <span class="q-sn">#${qData.n}</span>
                <span class="q-pts">[${qData.displayPts} 分]</span>
                <span class="q-rate" id="rate_${qData.n}">${getCorrectRateText(qData.n)}</span>
            </div>
        </div>
        <div class="q-text">${displayIdx}. ${qData.parsedQ}</div>
        <div class="interaction-area">${renderInteractionArea(qData)}</div>
        <div class="action-row" id="act_${qData.n}" style="${sysSettings.delayed && qData.t !== 3 ? 'display:none;' : ''}">
            <button class="toggle-exp-btn" onclick="toggleExp(${qData.n})">${isAutoExpand ? '隱藏詳解' : '查看詳解'}</button>
        </div>
        <div class="explanation-box ${isAutoExpand ? 'show' : ''}" id="exp_${qData.n}">
            ${answerBlock}
            <div class="exp-key">💡 觀念：${qData.k}</div>
            <div class="exp-title">📝 分析：</div>
            <div>${qData.parsedExp}</div>
        </div>
    `;
    card.innerHTML = html;
    return card;
}

function renderInteractionArea(qData) {
    if (qData.t === 1) {
        const labels = ['A', 'B', 'C', 'D'];
        let optsHtml = labels.map(L => {
            const key = qData.mapLabelToKey[L];
            if (!key) return '';
            return `<label class="option-label" id="lbl_${qData.n}_${key}">
                        <input type="radio" name="ans_${qData.n}" value="${key}" onchange="handleSelect(${qData.n}, '${key}')">
                        (${L}) ${qData.parsedOpts[key]}
                    </label>`;
        }).join('');
        return `<div class="options-list">${optsHtml}</div>`;
    } 
    else if (qData.t === 2) {
        return `<div class="options-list">
                    <label class="option-label" id="lbl_${qData.n}_1"><input type="radio" name="ans_${qData.n}" value="1" onchange="handleSelect(${qData.n}, 1)">(O) 正確</label>
                    <label class="option-label" id="lbl_${qData.n}_0"><input type="radio" name="ans_${qData.n}" value="0" onchange="handleSelect(${qData.n}, 0)">(X) 錯誤</label>
                </div>`;
    }
    else if (qData.t === 3) {
        return `
            <textarea class="sa-textarea" id="sa_text_${qData.n}" placeholder="輸入作答..."></textarea>
            <div id="sa_actions_${qData.n}" style="text-align:right;">
                <button onclick="submitSA(${qData.n})" id="btn_sa_${qData.n}">完成 (對答案)</button>
            </div>
            <div id="sa_eval_${qData.n}" style="display:none; justify-content: flex-end; gap: 10px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border);">
                <span style="align-self: center; font-weight: bold; color: var(--text-sub);">請根據解答自評：</span>
                <button id="eval_c_${qData.n}" class="eval-btn eval-c" onclick="evaluateSA(${qData.n}, true)">✅ 答對</button>
                <button id="eval_i_${qData.n}" class="eval-btn eval-i" onclick="evaluateSA(${qData.n}, false)">❌ 答錯</button>
            </div>`;
    }
    return '';
}

// ==========================================
// 6. 互動與批改邏輯
// ==========================================
function handleSelect(n, value) {
    if (isGraded) return;
    currentAnswers[n] = value.toString();
    if (!sysSettings.delayed) gradeSingle(n);
}

function gradeSingle(n) {
    const qData = currentExamData.find(q => q.n === n);
    if (!qData || qData.t === 3) return;

    const userAns = currentAnswers[n];
    const correctAns = qData.t === 1 ? `o${qData.a}` : qData.a.toString();
    const isCorrect = (userAns === correctAns);

    lockAndHighlight(n, userAns, correctAns, isCorrect);
    updateHistory(n, isCorrect);
    document.getElementById(`rate_${n}`).innerText = getCorrectRateText(n);
    document.getElementById(`act_${n}`).style.display = 'flex';
    if (!isCorrect) forceShowExp(n);
}

function submitSA(n) {
    document.getElementById(`btn_sa_${n}`).style.display = 'none';
    document.getElementById(`sa_text_${n}`).disabled = true;
    document.getElementById(`sa_eval_${n}`).style.display = 'flex';
    document.getElementById(`act_${n}`).style.display = 'flex';
    forceShowExp(n);
}

function evaluateSA(n, isCorrect) {
    const qData = currentExamData.find(q => q.n === n);
    let h = userHistory[n] || { attempts: 0, correct: 0 };
    
    if (currentSAStatus[n] === undefined) {
        h.attempts += 1;
        if (isCorrect) h.correct += 1;
    } else {
        if (currentSAStatus[n] === false && isCorrect) h.correct += 1;
        if (currentSAStatus[n] === true && !isCorrect) h.correct = Math.max(0, h.correct - 1);
    }
    
    currentSAStatus[n] = isCorrect;
    userHistory[n] = h;
    localStorage.setItem(KEY_HISTORY, JSON.stringify(userHistory));
    
    document.getElementById(`rate_${n}`).innerText = getCorrectRateText(n);
    
    const card = document.getElementById(`qcard_${n}`);
    card.classList.remove('answered-correct', 'answered-incorrect');
    card.classList.add(isCorrect ? 'answered-correct' : 'answered-incorrect');
    
    document.getElementById(`eval_c_${n}`).classList.toggle('active', isCorrect);
    document.getElementById(`eval_i_${n}`).classList.toggle('active', !isCorrect);
    
    if (isGraded) recalculateScoreBoard();
}

function gradeAllExam() {
    if (isGraded) return;
    isGraded = true;

    currentExamData.forEach(qData => {
        if (qData.t === 3) {
            submitSA(qData.n); 
        } else {
            const userAns = currentAnswers[qData.n];
            const correctAns = qData.t === 1 ? `o${qData.a}` : qData.a.toString();
            const isCorrect = (userAns === correctAns);

            lockAndHighlight(qData.n, userAns, correctAns, isCorrect);
            updateHistory(qData.n, isCorrect);
            document.getElementById(`rate_${qData.n}`).innerText = getCorrectRateText(qData.n);
            document.getElementById(`act_${qData.n}`).style.display = 'flex';
            if (!isCorrect) forceShowExp(qData.n);
        }
    });

    recalculateScoreBoard();
    document.getElementById("scoreBoard").style.display = 'block';
    const submitBtn = document.querySelector('.large-submit');
    if (submitBtn) submitBtn.style.display = 'none';
    
    window.scrollTo({ top: 0, behavior: 'smooth' });
    triggerKaTeX();
}

// 採用最新「區塊比例計分法」重算計分板
function recalculateScoreBoard() {
    let totalPossibleScore = 0;
    let totalEarnedScore = 0;
    
    [1, 2, 3].forEach(typeNum => {
        const sectionQs = currentExamData.filter(q => q.t === typeNum);
        if (sectionQs.length === 0) return;
        
        const sectionTotalPts = sysSettings.pts[typeNum];
        totalPossibleScore += sectionTotalPts;
        
        let correctCount = 0;
        sectionQs.forEach(q => {
            if (q.t === 1 || q.t === 2) {
                const userAns = currentAnswers[q.n];
                const correctAns = q.t === 1 ? `o${q.a}` : q.a.toString();
                if (userAns === correctAns) correctCount++;
            } else if (q.t === 3) {
                if (currentSAStatus[q.n] === true) correctCount++;
            }
        });
        
        const sectionEarned = (correctCount / sectionQs.length) * sectionTotalPts;
        totalEarnedScore += sectionEarned;
    });

    document.getElementById("scoreBoard").innerHTML = `🏁 測驗結束！您的總得分：<strong>${Math.round(totalEarnedScore * 100) / 100} / ${Math.round(totalPossibleScore * 100) / 100}</strong>`;
}

function lockAndHighlight(n, selectedVal, correctVal, isCorrect) {
    const card = document.getElementById(`qcard_${n}`);
    card.classList.add(isCorrect ? 'answered-correct' : 'answered-incorrect');
    const inputs = document.querySelectorAll(`input[name="ans_${n}"]`);
    inputs.forEach(input => {
        input.disabled = true;
        const lbl = document.getElementById(`lbl_${n}_${input.value}`);
        lbl.classList.add('disabled');
        if (input.value === correctVal) lbl.classList.add('is-correct');
        else if (input.value === selectedVal && !isCorrect) lbl.classList.add('is-incorrect');
    });
}

function toggleExp(n) {
    const box = document.getElementById(`exp_${n}`);
    const btn = document.querySelector(`#qcard_${n} .toggle-exp-btn`);
    box.classList.toggle('show');
    btn.innerText = box.classList.contains('show') ? '隱藏詳解' : '查看詳解';
}
function forceShowExp(n) {
    const box = document.getElementById(`exp_${n}`);
    const btn = document.querySelector(`#qcard_${n} .toggle-exp-btn`);
    if (!box.classList.contains('show')) { box.classList.add('show'); btn.innerText = '隱藏詳解'; }
}

document.getElementById('btnGenerate').addEventListener('click', generateExam);
document.getElementById('themeSelect').addEventListener('change', (e) => { applyTheme(e.target.value); saveSettings(); });

document.getElementById('cfg_mode').addEventListener('change', (e) => {
    if (e.target.value === 'all') {
        sysSettings.counts[1] = parseInt(document.getElementById('cfg_t1').value)||0;
        sysSettings.counts[2] = parseInt(document.getElementById('cfg_t2').value)||0;
        sysSettings.counts[3] = parseInt(document.getElementById('cfg_t3').value)||0;
    }
    updateCountUI();
    saveSettings();
});

document.getElementById('btnClearSettings').addEventListener('click', () => {
    if(confirm("確定恢復設定預設值？")) { localStorage.removeItem(KEY_SETTINGS); initStorage(); }
});
document.getElementById('btnClearHistory').addEventListener('click', () => {
    if(confirm("警告：將清除所有答題歷史，確定？")) { localStorage.removeItem(KEY_HISTORY); userHistory = {}; alert("已清除"); }
});

initStorage();
