                margin-bottom: 10px;
                padding: 15px;
                background: var(--row-bg);

                margin-bottom: 15px;

                padding: 15px;
                border-left: 4px solid var(--primary-color);
            }
        }

</head>

    // ==========================================
    // 狀態持久化邏輯 (LocalStorage)
    // ==========================================
    const STORAGE_KEY = 'nsm_preferences';

    function loadSettings() {
        const defaultSettings = { sortMode: 'theme', masterToggle: true, theme: 'auto' };
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultSettings;
        
        document.getElementById('sortMode').value = saved.sortMode;
        document.getElementById('masterToggle').checked = saved.masterToggle;
        document.getElementById('themeSelect').value = saved.theme;
        
        applyTheme(saved.theme);
        return saved;
    }

    function saveSettings() {
        const settings = {
            sortMode: document.getElementById('sortMode').value,
            masterToggle: document.getElementById('masterToggle').checked,
            theme: document.getElementById('themeSelect').value
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
    }

    // ==========================================
    // 佈景主題套用邏輯 (支援 Auto)
    // ==========================================
    function applyTheme(themeValue) {
        let activeTheme = themeValue;
        if (themeValue === 'auto') {
            // 偵測作業系統目前是否為深色模式
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            activeTheme = prefersDark ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', activeTheme);
    }

    // 監聽系統主題切換事件
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        if (document.getElementById('themeSelect').value === 'auto') {
            applyTheme('auto');
        }
    });

    // ==========================================
    // 渲染引擎
    // ==========================================
    function render() {
        const container = document.getElementById("mainContent");
        const mode = document.getElementById("sortMode").value;
        const allOpen = document.getElementById("masterToggle").checked;
        container.innerHTML = "";

        if (mode === "sn") {
            const sorted = [...papersData].sort((a, b) => a.sn - b.sn);
            const tableContainer = document.createElement("div");
            tableContainer.className = "theme-section"; 
            
            const tableTitle = document.createElement("h2");
            tableTitle.className = "theme-header";
            tableTitle.innerHTML = `<span>📂 依照編號排序</span>`;
            tableContainer.appendChild(tableTitle);

            tableContainer.appendChild(createTable(sorted, allOpen, "sn-view", mode));
            container.appendChild(tableContainer);
        } else {
            themeData.forEach(theme => {
                const filtered = papersData
                    .filter(p => p.themeId === theme.id)
                    .sort((a, b) => a.sn - b.sn);
                
                if (filtered.length > 0) {
                    const section = document.createElement("div");
                    section.className = "theme-section";

                    const attributesHtml = theme.attributes.map(attr => 
                        `<div class="meta-item"><span class="meta-label">${attr.label}</span><span style="color: var(--text-main);">${attr.content}</span></div>`
                    ).join('');

                    section.innerHTML = `
                        <h2 class="theme-header">
                            <span class="theme-id">📌 主題 ${theme.id}:</span>
                            <span>${theme.name}</span>
                        </h2>
                        <div style="margin-bottom:15px; color: var(--text-main);">${theme.description}</div>
                        <div class="theme-meta-container">
                            ${attributesHtml}
                        </div>
                    `;
                    section.appendChild(createTable(filtered, allOpen, `theme-${theme.id}`, mode));
                    container.appendChild(section);
                }
            });
        }
    }

    function createTable(papers, isAllOpen, idPrefix, mode) {
        const table = document.createElement("table");
        if (mode === 'sn') table.className = "sn-view-table";
        
        table.innerHTML = `
            <thead>
                <tr>
                    <th style="width: 2ch; white-space: nowrap; text-align: center">SN</th>
                    <th style="width: 2ch; white-space: nowrap; text-align: center">Link</th>
                    <th>Article Title</th>
                    <th style="width: 15%; font-size: 0.9em;">Authors / Source</th>
                    <th style="width: 5ch; white-space: nowrap; text-align: center">操作</th>
                </tr>
            </thead>
            <tbody></tbody>
        `;
        const tbody = table.querySelector("tbody");

        papers.forEach(p => {
            const mainRow = document.createElement("tr");
            mainRow.className = "main-row";
            
            const formattedLinkCell = `
                <td style="text-align: center; vertical-align: middle;">
                    <a href="${p.link}" target="_blank" style="text-decoration:none; display: flex; justify-content: center; align-items: center;" title="Google Scholar">
                        ${linkIconSvg}
                    </a>
                </td>`;

            mainRow.innerHTML = `
                <td style="text-align: center; font-family: monospace; color: var(--text-sub);">${p.sn}</td>
                ${formattedLinkCell}
                <td style="font-weight:600;">
                    <div class="title-cell">
                        <span class="title-en">${p.title_en}</span>
                        <span class="title-zh">${p.title_zh}</span>
                    </div>
                </td>
                <td style="font-size:0.9em; line-height: 1.3; color: var(--text-main);">
                    ${p.authors} / <span style="color: var(--text-sub); font-weight: 500;">${p.journal} (${p.date})</span>
                </td>
                <td style="text-align: center; white-space: nowrap;">
                    <div class="toggle-btn" data-target="sum-${idPrefix}-${p.sn}">${isAllOpen ? '收合' : '展開'}</div>
                </td>
            `;
            
            const summaryRow = document.createElement("tr");
            summaryRow.id = `sum-${idPrefix}-${p.sn}`;
            summaryRow.className = `summary-row ${isAllOpen ? '' : 'hidden'}`;
            summaryRow.innerHTML = `
                <td colspan="5">
                    <div class="summary-content">
                        ${p.summary}
                    </div>
                </td>
            `;
            tbody.appendChild(mainRow);
            tbody.appendChild(summaryRow);
        });
        return table;
    }

    // ==========================================
    // 綁定事件監聽與初始化
    // ==========================================
    document.getElementById("sortMode").addEventListener("change", () => { saveSettings(); render(); });
    document.getElementById("masterToggle").addEventListener("change", () => { saveSettings(); render(); });
    
    document.getElementById("themeSelect").addEventListener("change", (e) => {
        applyTheme(e.target.value);
        saveSettings();
    });

    document.getElementById("mainContent").addEventListener("click", e => {
        if (e.target.classList.contains("toggle-btn")) {
            const target = document.getElementById(e.target.dataset.target);
            target.classList.toggle("hidden");
            e.target.textContent = target.classList.contains("hidden") ? "展開" : "收合";
        }
    });

    // 啟動程序
    loadSettings();
    render();

</script>
